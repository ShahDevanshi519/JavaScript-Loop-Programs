<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum Of Digits</title>
</head>
<body>
    <form>
        Enter Number:<input type="text" id="num"><br><br>
        <button type="button" onclick="handleDigits()">Click Me</button>
    </form>
    <div id="root"></div>
    <script>
        function handleDigits(){
            let num = Number(document.getElementById("num").value);
            let sum = 0;

            while(num > 0){
                let digits = num % 10;
                sum = sum + digits;
                num = Math.floor(num / 10);
            }

            document.getElementById("root").innerText = "Sum Of Digits Is = " + sum;
        }
    </script>
</body>
</html>
