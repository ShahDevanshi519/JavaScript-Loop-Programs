<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print 1 to N</title>
</head>
<body>
    <form>
        Enter Number:<input type="text" id="num"><br><br>
        <button type="button" onclick="handle()">click me</button>
    </form>
    <div id="root"></div>
    <script>
        function handle(){
            let num = Number(document.getElementById("num").value);

            for(let i=1;i<=num;i++){
                document.getElementById("root").innerText += " "  + i + " "; 
            }
        }
    </script>
</body>
</html>
