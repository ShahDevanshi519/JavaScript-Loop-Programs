<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Armstrong Number</title>
</head>
<body>
    <form>
        Enter Number:<input type="text" id="num"><br><br>
        <button type="button" onclick="handleArmstrong()">Click Me</button>
    </form>
    <div id="root"></div>
    <script>
        function handleArmstrong(){
            let num = Number(document.getElementById("num").value);

            let originalnum = num;
            let sum = 0;

            while(num > 0){
                let digit = num % 10;
                sum = sum + Math.pow(digit,3);
                num = Math.floor(num / 10);
            }

            if(sum === originalnum){
                document.getElementById("root").innerText = "Armstrong Number!";
            }else{
                document.getElementById("root").innerText = "Not Armstrong Number!";
            }
        }
    </script>
</body>
</html>
