<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Count Even Digits</title>
</head>
<body>
    <form>
        Enter Number:<input type="text" id="num"><br><br>
        <button type="button" onclick="handleEven()">Click Me</button>
    </form>
    <div id="root"></div>
    <script>
        function handleEven(){
            let num = Number(document.getElementById("num").value);
            let count = 0;

            while(num > 0){
                let digits = num % 10;
                if(digits % 2 === 0){
                    count ++;
                }

                num = Math.floor(num / 10);
            }

            document.getElementById("root").innerText = "Event Digits = " + count;
        }
    </script>
</body>
</html>
