<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse Number</title>
</head>
<body>
    <form>
        Enter Number:<input type="text" id="num"><br><br>
        <button type="button" onclick="handleReverseNumber()">Click Me</button>
    </form>
    <div id="root"></div>
    <script>
        function handleReverseNumber(){
            let num = Number(document.getElementById("num").value);
            let reverse = 0;
            

            while(num > 0){
                let digits = num % 10;
                reverse = reverse * 10 + digits;
                num = Math.floor(num /  10);
            }

            document.getElementById("root").innerText = reverse;
        }
    </script>
</body>
</html>
