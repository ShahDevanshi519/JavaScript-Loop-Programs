<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palindrom Number</title>
</head>
<body>
    <form>
        Enter Number:<input type="text" id="num"><br><br>
        <button type="button" onclick="handlePalindrom()">Click Me</button>
    </form>
    <div id="root"></div>
    <script>
        function handlePalindrom(){
            let num = Number(document.getElementById("num").value);
            let originalnum = num;
            let reverse = 0;

            while(num > 0){
                let digits = num % 10;
                reverse = reverse * 10 + digits;
                num =  Math.floor(num / 10);
            }

            if(reverse === originalnum){
                document.getElementById("root").innerText = "Palindrom Number";
            }else{
                document.getElementById("root").innerText = "Not Palindrom Number";
            }
        }
    </script>
</body>
</html>
